<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NexusCore | Network Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #03060c;
            --bg-secondary: #07120e;
            --card-bg: rgba(6, 18, 12, 0.85);
            --accent-green: #0aff8c;
            --accent-cyan: #00d4ff;
            --accent-orange: #ff6a2e;
            --accent-red: #ff3366;
            --accent-purple: #b266ff;
            --accent-gray: #6c757d;
            --glow-intensity: 0px;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #03060c 0%, #0a1912 50%, #030a06 100%);
            font-family: 'Space Grotesk', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }

        body.crashed {
            background: linear-gradient(135deg, #1a0000 0%, #2a0a0a 50%, #1a0303 100%);
        }

        body.crashed .dashboard {
            border-color: #ff3366;
            box-shadow: 0 0 50px rgba(255, 51, 102, 0.3);
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        .dashboard {
            position: relative;
            z-index: 2;
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            border: 1px solid rgba(10, 255, 140, 0.25);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .dashboard.crashed-mode {
            border-color: #ff3366;
            background: rgba(30, 10, 10, 0.9);
        }

        .network-header {
            padding: 2rem 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid rgba(10, 255, 140, 0.2);
        }

        .crashed-mode .network-header {
            border-bottom-color: rgba(255, 51, 102, 0.3);
        }

        .tier-badge {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            background: rgba(10, 255, 140, 0.1);
            border-radius: 60px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--accent-green);
            border: 1px solid rgba(10, 255, 140, 0.3);
            margin-bottom: 1rem;
        }

        .crashed-mode .tier-badge {
            background: rgba(255, 51, 102, 0.15);
            color: #ff6680;
            border-color: rgba(255, 51, 102, 0.4);
        }

        .network-name {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--accent-green));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .crashed-mode .network-name {
            background: linear-gradient(135deg, #ff6666, #ff3366);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .speed-display {
            font-size: 1.2rem;
            color: #8bc34a;
            opacity: 0.9;
            font-weight: 500;
        }

        .crashed-mode .speed-display {
            color: #ff8888;
        }

        .animation-zone {
            padding: 2rem;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #networkCanvas {
            width: 100%;
            height: 280px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 1.5rem;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(10, 255, 140, 0.2);
            margin-bottom: 1.5rem;
        }

        .crashed-mode #networkCanvas {
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 51, 102, 0.3);
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .status-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 1rem;
            padding: 0.8rem;
            text-align: center;
            border: 1px solid rgba(10, 255, 140, 0.2);
            backdrop-filter: blur(4px);
        }

        .crashed-mode .status-card {
            border-color: rgba(255, 51, 102, 0.3);
        }

        .status-label {
            font-size: 0.7rem;
            color: #6c8b74;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .crashed-mode .status-label {
            color: #aa8888;
        }

        .status-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-green);
            margin-top: 0.3rem;
        }

        .crashed-mode .status-value {
            color: #ff8888;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(10, 255, 140, 0.2);
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulse 1.2s infinite;
        }

        .crashed-mode .pulse-dot {
            background: #ff3366;
            box-shadow: 0 0 10px #ff3366;
            animation: pulseRed 0.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        @keyframes pulseRed {
            0%, 100% { opacity: 0.4; transform: scale(0.8); background: #ff3366; }
            50% { opacity: 1; transform: scale(1.3); background: #ff6666; }
        }

        .timestamp {
            font-size: 0.7rem;
            color: #5a7a62;
            font-family: monospace;
        }

        .footer-note {
            padding: 1rem 2rem;
            text-align: center;
            font-size: 0.65rem;
            color: #3a5a4a;
            border-top: 1px solid rgba(10, 255, 140, 0.1);
        }

        .crashed-mode .footer-note {
            color: #aa6666;
            border-top-color: rgba(255, 51, 102, 0.2);
        }

        .alert-banner {
            background: linear-gradient(90deg, #ff3366, #ff6680);
            color: white;
            text-align: center;
            padding: 0.5rem;
            font-size: 0.8rem;
            font-weight: bold;
            animation: alertPulse 0.5s infinite;
        }

        @keyframes alertPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        @media (max-width: 600px) {
            .dashboard { margin: 0; }
            .network-name { font-size: 2rem; }
            .status-grid { gap: 0.5rem; }
            .animation-zone { padding: 1rem; }
            #networkCanvas { height: 200px; }
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="dashboard" id="dashboard">
        <div class="network-header">
            <div class="tier-badge" id="tierBadge">⚡ NETWORK STATUS</div>
            <div class="network-name" id="networkName">3.5G</div>
            <div class="speed-display" id="speedDisplay">~42 Mbps • STANDARD</div>
        </div>

        <div class="animation-zone">
            <canvas id="networkCanvas" width="700" height="280"></canvas>
            <div class="status-grid">
                <div class="status-card">
                    <div class="status-label">LATENCY</div>
                    <div class="status-value" id="latencyValue">42ms</div>
                </div>
                <div class="status-card">
                    <div class="status-label">BANDWIDTH</div>
                    <div class="status-value" id="bandwidthValue">42 Mbps</div>
                </div>
                <div class="status-card">
                    <div class="status-label">SIGNAL</div>
                    <div class="status-value" id="signalValue">████▁▁</div>
                </div>
            </div>
            <div class="live-indicator">
                <div class="pulse-dot"></div>
                <span style="color: #8bc34a;" id="liveText">LIVE SYNC • REAL-TIME NETWORK</span>
                <span class="timestamp" id="timestamp">--:--:--</span>
            </div>
        </div>
        <div class="footer-note">
            🔥 Network visualization scales with speed • Powered by Firebase Realtime
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBkJS5POxWI4iXudrhLXbCRqafXqVEceSA",
            authDomain: "biosonic-d86a5.firebaseapp.com",
            projectId: "biosonic-d86a5",
            storageBucket: "biosonic-d86a5.firebasestorage.app",
            messagingSenderId: "457119496438",
            appId: "1:457119496438:web:dc70c15048cd025b7914d7",
            databaseURL: "https://biosonic-d86a5-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const networkStatusRef = ref(db, 'networkStatus');

        // Complete Network Tier Definitions
        const tierConfig = {
            "0.5G Lost Network": { speed: "0 Mbps", latency: "∞", signal: "▁▁▁▁▁", color: "#6c757d", particleSpeed: 0.1, waveIntensity: 0.05, status: "disconnected", icon: "💀" },
            "1.5G Degraded": { speed: "1.5 Mbps", latency: "350ms", signal: "█▁▁▁▁", color: "#8e8e8e", particleSpeed: 0.3, waveIntensity: 0.1, status: "degraded", icon: "⚠️" },
            "2.5G Edge": { speed: "12 Mbps", latency: "120ms", signal: "██▁▁▁", color: "#b8b8b8", particleSpeed: 0.6, waveIntensity: 0.2, status: "edge", icon: "📶" },
            "3.5G": { speed: "42 Mbps", latency: "42ms", signal: "████▁▁", color: "#0aff8c", particleSpeed: 1, waveIntensity: 0.3, status: "active", icon: "📡" },
            "4.5G": { speed: "300 Mbps", latency: "28ms", signal: "█████▁", color: "#2effaa", particleSpeed: 2, waveIntensity: 0.5, status: "active", icon: "⚡" },
            "5.5G Super Fast": { speed: "1.2 Gbps", latency: "12ms", signal: "██████", color: "#ffcc44", particleSpeed: 3, waveIntensity: 0.7, status: "active", icon: "🚀" },
            "6.0G Turbo": { speed: "3.8 Gbps", latency: "5ms", signal: "██████🔥", color: "#ff8844", particleSpeed: 4, waveIntensity: 0.85, status: "active", icon: "🔥" },
            "6.5G Ultra Turbo": { speed: "7.2 Gbps", latency: "2ms", signal: "██████⚡", color: "#ff5533", particleSpeed: 5, waveIntensity: 0.95, status: "active", icon: "🌋" },
            "6.6G Supersonic": { speed: "12 Gbps", latency: "0.8ms", signal: "██████💥", color: "#ff3366", particleSpeed: 6, waveIntensity: 1.0, status: "active", icon: "💥" },
            "6.7G Hypersonic": { speed: "25 Gbps", latency: "0.3ms", signal: "██████🌀", color: "#b266ff", particleSpeed: 7, waveIntensity: 1.2, status: "active", icon: "🌀" },
            "SERVER_CRASHED": { speed: "0 Mbps", latency: "N/A", signal: "💀💀💀", color: "#ff0000", particleSpeed: 0, waveIntensity: 0, status: "crashed", icon: "💀" }
        };

        let currentTier = "3.5G";
        let isCrashed = false;
        let animationFrame;
        let wavePhase = 0;
        let particles = [];
        let canvas, ctx, width, height;

        // DOM Elements
        const dashboard = document.getElementById('dashboard');
        const networkNameEl = document.getElementById('networkName');
        const speedDisplayEl = document.getElementById('speedDisplay');
        const latencyValueEl = document.getElementById('latencyValue');
        const bandwidthValueEl = document.getElementById('bandwidthValue');
        const signalValueEl = document.getElementById('signalValue');
        const tierBadgeEl = document.getElementById('tierBadge');
        const timestampEl = document.getElementById('timestamp');
        const liveTextEl = document.getElementById('liveText');

        function setupCanvas() {
            canvas = document.getElementById('networkCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            initParticles(80);
            animate();
        }

        function resizeCanvas() {
            const container = canvas.parentElement;
            width = canvas.clientWidth;
            height = canvas.clientHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function initParticles(count) {
            particles = [];
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    size: Math.random() * 3 + 1,
                    alpha: Math.random() * 0.5 + 0.2
                });
            }
        }

        function updateParticles(intensity) {
            if (isCrashed) return;
            const speed = tierConfig[currentTier]?.particleSpeed || 1;
            for (let p of particles) {
                p.x += p.vx * (speed * 0.3);
                p.y += p.vy * (speed * 0.3);
                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;
            }
        }

        function drawCrashedAnimation() {
            if (!ctx || width === 0) return;
            ctx.clearRect(0, 0, width, height);
            
            // Static noise effect
            for (let i = 0; i < 200; i++) {
                ctx.fillStyle = `rgba(255, ${Math.random() * 100}, ${Math.random() * 100}, ${Math.random() * 0.5})`;
                ctx.fillRect(Math.random() * width, Math.random() * height, 2, 2);
            }
            
            // Glitch lines
            for (let i = 0; i < 20; i++) {
                ctx.beginPath();
                ctx.moveTo(0, Math.random() * height);
                ctx.lineTo(width, Math.random() * height);
                ctx.strokeStyle = `rgba(255, 0, 0, ${Math.random() * 0.5})`;
                ctx.stroke();
            }
            
            // Error text
            ctx.font = "bold 20px monospace";
            ctx.fillStyle = "#ff3366";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff0000";
            ctx.fillText("⚠️ SYSTEM CRASHED ⚠️", width/2 - 100, height/2);
            ctx.font = "12px monospace";
            ctx.fillStyle = "#ff8888";
            ctx.fillText("SERVER UNAVAILABLE", width/2 - 70, height/2 + 40);
            ctx.shadowBlur = 0;
        }

        function drawNetworkAnimation() {
            if (!ctx || width === 0) return;
            
            if (isCrashed) {
                drawCrashedAnimation();
                return;
            }
            
            ctx.clearRect(0, 0, width, height);
            
            const config = tierConfig[currentTier] || tierConfig["3.5G"];
            const intensity = config.waveIntensity;
            const mainColor = config.color;
            
            ctx.fillStyle = `rgba(0, 0, 0, 0.3)`;
            ctx.fillRect(0, 0, width, height);
            
            // Draw particles (data packets)
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (0.5 + intensity * 0.8), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${hexToRgb(mainColor)}, ${p.alpha * (0.3 + intensity)})`;
                ctx.fill();
            }
            
            // Draw waveform
            wavePhase += 0.02 * (intensity * 1.5);
            ctx.beginPath();
            const step = width / 60;
            for (let i = 0; i <= 60; i++) {
                const x = i * step;
                const amplitude = 40 + (intensity * 60);
                const y = height / 2 + Math.sin(wavePhase + i * 0.15) * amplitude * (0.5 + intensity * 0.8);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = mainColor;
            ctx.lineWidth = 2 + intensity * 3;
            ctx.shadowBlur = 10 * intensity;
            ctx.shadowColor = mainColor;
            ctx.stroke();
            
            // Energy rings for high tiers
            if (intensity > 0.7 && !isCrashed) {
                for (let r = 0; r < 3; r++) {
                    ctx.beginPath();
                    const ringSize = 50 + (Date.now() * 0.003 + r * 100) % 100;
                    ctx.arc(width / 2, height / 2, ringSize * (0.5 + intensity * 0.5), 0, Math.PI * 2);
                    ctx.strokeStyle = mainColor;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
            }
            
            // Data streams
            if (intensity > 0.5 && !isCrashed) {
                for (let i = 0; i < Math.floor(intensity * 8); i++) {
                    ctx.beginPath();
                    const startX = (Date.now() * 0.005 * intensity + i * 50) % (width + 100) - 50;
                    ctx.moveTo(startX, 0);
                    ctx.lineTo(startX + 30, height);
                    ctx.strokeStyle = `rgba(${hexToRgb(mainColor)}, 0.2)`;
                    ctx.stroke();
                }
            }
            
            ctx.shadowBlur = 0;
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : "10, 255, 140";
        }

        function updateUI() {
            if (isCrashed) {
                networkNameEl.innerHTML = "💀 SERVER CRASHED 💀";
                speedDisplayEl.innerHTML = "SYSTEM FAILURE • NO CONNECTION";
                latencyValueEl.innerHTML = "N/A";
                bandwidthValueEl.innerHTML = "0 Mbps";
                signalValueEl.innerHTML = "💀💀💀";
                tierBadgeEl.innerHTML = "⚠️ CRITICAL FAILURE ⚠️";
                liveTextEl.innerHTML = "🔴 SERVER OFFLINE • EMERGENCY MODE";
                dashboard.classList.add('crashed-mode');
                document.body.classList.add('crashed');
                return;
            }
            
            dashboard.classList.remove('crashed-mode');
            document.body.classList.remove('crashed');
            
            const config = tierConfig[currentTier];
            if (!config) return;
            
            const icon = config.icon || "📡";
            networkNameEl.innerHTML = `${icon} ${currentTier} ${icon}`;
            speedDisplayEl.innerHTML = `~${config.speed} • ${config.status === "degraded" ? "DEGRADED MODE" : config.status === "edge" ? "EDGE NETWORK" : "ACTIVE"}`;
            latencyValueEl.innerHTML = config.latency;
            bandwidthValueEl.innerHTML = config.speed;
            signalValueEl.innerHTML = config.signal;
            
            let badgeText = "";
            if (currentTier.includes("Lost")) badgeText = "💀 NETWORK LOST 💀";
            else if (currentTier.includes("Degraded")) badgeText = "⚠️ DEGRADED SIGNAL ⚠️";
            else if (currentTier.includes("Edge")) badgeText = "📶 EDGE NETWORK 📶";
            else badgeText = `⚡ ${currentTier.toUpperCase()} ACTIVE ⚡`;
            tierBadgeEl.innerHTML = badgeText;
            
            liveTextEl.innerHTML = config.status === "degraded" ? "⚠️ DEGRADED PERFORMANCE" : 
                                   config.status === "edge" ? "📶 EDGE CONNECTIVITY" : 
                                   "🟢 LIVE SYNC • REAL-TIME NETWORK";
            
            // Update dashboard styling based on status
            const dashboardEl = document.querySelector('.dashboard');
            if (config.status === "degraded") {
                dashboardEl.style.borderColor = `rgba(255, 200, 100, 0.5)`;
            } else if (config.status === "edge") {
                dashboardEl.style.borderColor = `rgba(200, 200, 200, 0.5)`;
            } else {
                dashboardEl.style.borderColor = `rgba(10, 255, 140, 0.3)`;
            }
            
            timestampEl.innerHTML = new Date().toLocaleTimeString();
        }

        function animate() {
            if (!isCrashed) {
                const config = tierConfig[currentTier];
                if (config && !isCrashed) {
                    updateParticles(config.waveIntensity);
                    drawNetworkAnimation();
                } else {
                    drawCrashedAnimation();
                }
            } else {
                drawCrashedAnimation();
            }
            requestAnimationFrame(animate);
        }

        function initParticleBackground() {
            const particleCanvas = document.getElementById('particleCanvas');
            const pCtx = particleCanvas.getContext('2d');
            let pWidth, pHeight;
            let bgParticles = [];
            
            function resizeBg() {
                pWidth = window.innerWidth;
                pHeight = window.innerHeight;
                particleCanvas.width = pWidth;
                particleCanvas.height = pHeight;
            }
            
            function initBgParticles() {
                bgParticles = [];
                for (let i = 0; i < 100; i++) {
                    bgParticles.push({
                        x: Math.random() * pWidth,
                        y: Math.random() * pHeight,
                        radius: Math.random() * 2,
                        alpha: Math.random() * 0.3
                    });
                }
            }
            
            function drawBg() {
                if (!pCtx) return;
                pCtx.clearRect(0, 0, pWidth, pHeight);
                for (let p of bgParticles) {
                    pCtx.beginPath();
                    pCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    pCtx.fillStyle = `rgba(10, 255, 140, ${p.alpha * 0.3})`;
                    pCtx.fill();
                }
                requestAnimationFrame(drawBg);
            }
            
            window.addEventListener('resize', () => {
                resizeBg();
                initBgParticles();
            });
            resizeBg();
            initBgParticles();
            drawBg();
        }
        
        // Firebase Listener
        onValue(networkStatusRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                if (data.serverCrashed === true || data.currentTier === "SERVER_CRASHED") {
                    isCrashed = true;
                    updateUI();
                } else {
                    isCrashed = false;
                    let newTier = data.currentTier || "3.5G";
                    
                    // Normalize tier names
                    const validTiers = Object.keys(tierConfig);
                    if (!validTiers.includes(newTier)) {
                        if (newTier.includes("5.5G")) newTier = "5.5G Super Fast";
                        else if (newTier.includes("6.0G")) newTier = "6.0G Turbo";
                        else if (newTier.includes("6.5G")) newTier = "6.5G Ultra Turbo";
                        else if (newTier.includes("6.6G")) newTier = "6.6G Supersonic";
                        else if (newTier.includes("6.7G")) newTier = "6.7G Hypersonic";
                        else if (newTier.includes("4.5G")) newTier = "4.5G";
                        else if (newTier.includes("0.5G") || newTier.includes("Lost")) newTier = "0.5G Lost Network";
                        else if (newTier.includes("1.5G") || newTier.includes("Degraded")) newTier = "1.5G Degraded";
                        else if (newTier.includes("2.5G") || newTier.includes("Edge")) newTier = "2.5G Edge";
                        else newTier = "3.5G";
                    }
                    
                    if (currentTier !== newTier) {
                        currentTier = newTier;
                        updateUI();
                        
                        const dashboardEl = document.querySelector('.dashboard');
                        dashboardEl.style.transform = 'scale(1.02)';
                        setTimeout(() => { dashboardEl.style.transform = ''; }, 200);
                    }
                }
                updateUI();
            }
        });
        
        // Initialize
        setupCanvas();
        initParticleBackground();
        updateUI();
    </script>
</body>
</html>
